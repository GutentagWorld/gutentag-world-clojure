name: Gutentag, World!

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - uses: DeLaGuardo/setup-clojure@12

      - name: Run
        run: clojure -M gutentag_world.clj

      - name: Verify output
        run: bash test.sh
